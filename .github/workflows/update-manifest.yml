name: Update Manifest

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin to update'
        required: true
        type: choice
        options:
          - audiobook-metadata
          - autoscan-arr
          - requests-arr
          - requests-seerr
          - tmdb
          - tvdb
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CATALOG_PUSH_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Update catalog manifest
        env:
          GITHUB_TOKEN: ${{ secrets.CATALOG_SOURCE_TOKEN || github.token }}
          PLUGIN: ${{ inputs.plugin }}
          VERSION: ${{ inputs.version }}
        run: |
          case "${PLUGIN}" in
            requests-arr) REPO="Silo-Server/silo-plugins-requests-arr" ;;
            requests-seerr) REPO="Silo-Server/silo-plugins-requests-seerr" ;;
            *) REPO="Silo-Server/silo-plugin-${PLUGIN}" ;;
          esac
          go run ./cmd/update-catalog -repo "${REPO}" -tag "${VERSION}"

      - name: Commit and push
        env:
          PLUGIN: ${{ inputs.plugin }}
          VERSION: ${{ inputs.version }}
        run: |
          if git diff --quiet -- manifest.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update ${PLUGIN} to ${VERSION}"
          git pull --rebase origin main
          git push origin HEAD:main
